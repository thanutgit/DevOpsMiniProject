apiVersion: v1
kind: Namespace
metadata:
  name: devops-project 
---
apiVersion: v1
kind: Secret
metadata:
  name: devops-project-secret
  namespace: devops-project
type: Opaque
stringData:
  DB_HOST: "${{ secrets.DB_HOST }}"
  DB_NAME: "${{ secrets.DB_NAME }}"
  DB_PASSWORD: "${{ secrets.DB_PASSWORD }}"
  DB_PORT: "${{ secrets.DB_PORT }}"
  DB_USER: "${{ secrets.DB_USER }}"