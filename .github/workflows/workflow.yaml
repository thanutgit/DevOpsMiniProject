permissions:
  contents: read
  packages: write

name: Build Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v2026.03.06)'
        required: true
        default: ''
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - prd

jobs:

  Build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      IMAGE: ghcr.io/thanutgit/devopsminiproject-${{ github.event.inputs.environment }}:${{ github.event.inputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # กันไม่ให้ทับ tag เดิม (เดิมคุณมีอยู่แล้ว เก็บไว้)
      - name: Check if tag exists
        run: |
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image tag ${{ github.event.inputs.tag }} already exists!"
            exit 1
          fi

      # คำนวณเวลา build ส่งให้ Dockerfile ผ่าน build-arg
      - name: Set build time
        id: meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # build + push รวมในขั้นตอนเดียว ผ่าน buildkit (เสถียร ไม่เจอ unknown blob)
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ env.IMAGE }}
          build-args: |
            VERSION=${{ github.event.inputs.tag }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
            COMMIT_SHA=${{ github.sha }}