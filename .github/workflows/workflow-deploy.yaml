permissions:
  contents: read
  packages: write

name: Deploy App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v2026.03.06)'
        required: true
        default: ''

jobs:

  Deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Update image tag
        run: |
          sed -i 's|image: ghcr.io/thanutgit/devopsminiproject:.*|image: ghcr.io/thanutgit/devopsminiproject:${{ github.event.inputs.tag }}|' k8s/job.yaml
          sed -i 's|image: ghcr.io/thanutgit/devopsminiproject:.*|image: ghcr.io/thanutgit/devopsminiproject:${{ github.event.inputs.tag }}|' k8s/app.yaml

      - name: Create secret
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: devops-project-secret
            namespace: devops-project
          type: Opaque
          stringData:
            DB_HOST: "${{ secrets.DB_HOST }}"
            DB_NAME: "${{ secrets.DB_NAME }}"
            DB_PASSWORD: "${{ secrets.DB_PASSWORD }}"
            DB_PORT: "${{ secrets.DB_PORT }}"
            DB_USER: "${{ secrets.DB_USER }}"
          EOF

      - name : Deploy to K3s
        run : |
          set -e
          cd k8s
          kubectl apply -f configmap.yaml
          kubectl delete job devops-project-job -n devops-project --ignore-not-found
          kubectl apply -f job.yaml
          kubectl -n devops-project wait --for=condition=complete job/devops-project-job --timeout=30m 
          kubectl apply -f app.yaml
          kubectl rollout restart deployment/app-api -n devops-project
          kubectl rollout status deployment/app-api -n devops-project --timeout=30m
          kubectl apply -f hpa.yaml
