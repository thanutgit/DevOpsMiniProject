permissions:
  contents: read
  packages: write

name: Deploy App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v2026.03.06)'
        required: true
        default: ''

jobs:

  Deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name : Deploy to K3s
        run : |
          set -e
          cd k8s
          kubectl apply -f job.yaml
          kubectl -n devops-project wait --for=condition=complete devops-project-job --timeout=30m
          
          kubectl apply -f app.yaml
